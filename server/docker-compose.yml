x-django-service: &django-service
  build:
    context: .
    args:
      UID: ${UID:-1000}
      GID: ${GID:-1000}
  env_file: ./.env
  environment:
    DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
    DEBUG: ${DEBUG:-True}
    DB_NAME: ${DB_NAME:-booknest_db}
    DB_USER: ${DB_USER:-booknest}
    DB_PASSWORD: ${DB_PASSWORD:-booknest}
    DB_HOST: db
    DB_PORT: "3306"
    REDIS_URL: redis://redis:6379/1
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/0
  volumes:
    - .:/app
    - app_venv:/app/.venv
    - ./media:/app/media
    - ./logs:/app/logs
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  db:
    image: mariadb:11.8
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-booknest_db}
      MARIADB_USER: ${DB_USER:-booknest}
      MARIADB_PASSWORD: ${DB_PASSWORD:-booknest}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-booknest_root}
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      start_interval: 5s
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    <<: *django-service
    command: python manage.py migrate --noinput
    restart: "no"

  web:
    <<: *django-service
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "127.0.0.1:${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  celery:
    <<: *django-service
    command: celery -A config worker --loglevel=${CELERY_LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  app_venv:
  mariadb_data:
  redis_data:
