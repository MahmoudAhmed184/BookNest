# version: '3.8'

services:
  db:
    image: mariadb:11.8
    container_name: booknest_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-booknest_db}
      MARIADB_USER: ${DB_USER:-booknest}
      MARIADB_PASSWORD: ${DB_PASSWORD:-booknest}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-booknest_root}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - booknest_network
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u${DB_USER:-booknest} -p${DB_PASSWORD:-booknest}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: booknest_web
    restart: unless-stopped
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_NAME=${DB_NAME:-booknest_db}
      - DB_USER=${DB_USER:-booknest}
      - DB_PASSWORD=${DB_PASSWORD:-booknest}
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - booknest_network


  celery:
    build: .
    container_name: booknest_celery
    command: celery -A config worker --loglevel=info
    depends_on:
      - web
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_NAME=${DB_NAME:-booknest_db}
      - DB_USER=${DB_USER:-booknest}
      - DB_PASSWORD=${DB_PASSWORD:-booknest}
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - .:/app
    networks:
      - booknest_network

  redis:
    image: redis:7-alpine
    container_name: booknest_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - booknest_network


volumes:
  mariadb_data:
  redis_data:

networks:
  booknest_network:
    driver: bridge
